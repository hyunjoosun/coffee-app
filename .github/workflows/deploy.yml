name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Create .env for Vite (Secret 값을 빌드에 넣기)
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env

      - name: Build
        run: npm run build

      - name: Check Supabase env (배포 후 홈에 "연결됨" 안 보이면 여기 확인)
        run: |
          echo "VITE_SUPABASE_URL 설정됨: $([ -n \"$VITE_SUPABASE_URL\" ] && echo yes || echo no)"
          echo "VITE_SUPABASE_ANON_KEY 설정됨: $([ -n \"$VITE_SUPABASE_ANON_KEY\" ] && echo yes || echo no)"
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning::Supabase Secret이 비어 있음. Settings → Secrets에서 값 넣은 뒤 다시 배포하세요."
          fi

      - name: Set Git user (gh-pages 커밋용)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - run: npm run deploy
